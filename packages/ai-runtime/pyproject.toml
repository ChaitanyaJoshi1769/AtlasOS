[build-system]
requires = ["poetry-core>=1.7.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "atlas-ai-runtime"
version = "0.1.0"
description = "AtlasOS AI Runtime - Agent orchestration and memory system"
authors = ["Chaitanya Joshi <chaitanyajoshi15@gmail.com>"]
license = "Apache-2.0"
readme = "README.md"
packages = [{include = "src"}]

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.104.1"
uvicorn = "^0.24.0"
langgraph = "^0.0.20"
pydantic = "^2.5.0"
pydantic-settings = "^2.1.0"
pydantic-ai = "^0.0.0"
openai = "^1.3.0"
anthropic = "^0.7.0"
langchain = "^0.1.0"
httpx = "^0.25.0"
python-dotenv = "^1.0.0"
qdrant-client = "^2.7.0"
psycopg2-binary = "^2.9.9"
sqlalchemy = "^2.0.0"
aioredis = "^2.0.0"
redis = "^5.0.0"
tenacity = "^8.2.3"
python-logging-loki = "^0.3.2"
structlog = "^23.2.0"
pyOpenSSL = "^23.3.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-asyncio = "^0.21.0"
pytest-cov = "^4.1.0"
black = "^23.11.0"
isort = "^5.12.0"
flake8 = "^6.1.0"
mypy = "^1.7.0"
ruff = "^0.1.8"

[tool.poetry.group.test.dependencies]
pytest = "^7.4.0"
pytest-asyncio = "^0.21.0"
pytest-cov = "^4.1.0"
httpx-mock = "^0.3.0"

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 100
skip_gitignore = true

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
addopts = "--cov=src --cov-report=html --cov-report=term-missing"

[tool.coverage.run]
source = ["src"]
omit = ["*/migrations/*"]
